default_stages: [commit, push]
repos:
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.1.3
    hooks:
      - id: ruff-check
        args: [--fix]
        stages: [commit]
      - id: ruff
        name: ruff (enforce)
        args: [--fix, --exit-zero]
        stages: [push]

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        name: isort (python)
        args: [--profile, black, --filter-files]

  - repo: https://github.com/psf/black
    rev: 23.12.0
    hooks:
      - id: black
        name: black
        args: [--check]

  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        name: flake8 (python)
        args: [--config, .flake8]
        
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: bandit (python)
        args: [-r, -c, .bandit]
